# Copy to profile/preferences.yaml and fill in your real preferences.

target_roles:
  - Senior Software Engineer
  - Software Engineer 2
  - Software Engineer
  - Fullstack Engineer
  - Backend Engineer

locations:
  - Hyderabad, India
  - Bangalore/Bengaluru, India
  - New Delhi, India
  - Chennai, India
  - Pune, India
  - Gurgaon/Gurugram, India
  - Noida, India
  - India
  - Remote

remote_ok: true

seniority:
  min: mid       # junior, mid, senior, staff, principal
  max: Senior

salary:
  min_inr: 200000
  currency: INR

visa_sponsorship_needed: false

# Jobs scoring below this threshold are marked should_not_apply
fit_score_threshold: 70

# Hard non-negotiables — any job failing these is rejected without LLM call
non_negotiables:
  - no_relocation_required: false   # won't relocate to a new city
  - no_on_call_pager_duty: false   # on-call is fine

# Roles/industries to skip entirely
excluded_industries: []
excluded_titles:
  - "QA Engineer"
  - "Test Engineer"
