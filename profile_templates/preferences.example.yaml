# Copy to profile/preferences.yaml and fill in your real preferences.

target_roles:
  # Core software / backend
  - Software Engineer
  - Software Developer
  - Backend Engineer
  - Backend Developer
  - Software Development Engineer   # Amazon SDE style
  - Member of Technical Staff       # Anthropic / OpenAI style

  # Full-stack / frontend
  - Full Stack Engineer
  - Full Stack Developer
  - Frontend Engineer
  - Frontend Developer

  # Specialised engineering
  - Platform Engineer
  - Infrastructure Engineer
  - Site Reliability Engineer
  - DevOps Engineer
  - Cloud Engineer
  - ML Engineer
  - Machine Learning Engineer
  - AI Engineer
  - Data Engineer
  - Mobile Engineer
  - iOS Engineer
  - Android Engineer

  # Language / framework-specific
  - Python Engineer
  - Python Developer
  - Java Engineer
  - Java Developer
  - JavaScript Developer
  - TypeScript Engineer
  - Node Developer
  - React Engineer

  # ──────────────────────────────────────────────────────────────────────────
  # Customisation note
  # ──────────────────────────────────────────────────────────────────────────
  # Matching rule: ALL tokens in an entry must appear in the job title.
  #   "Software Engineer" matches "Senior Software Engineer" ✓
  #   "Software Engineer" does NOT match "Security Engineer" ✗
  # Add entries here to widen the filter; remove entries to narrow it.
  # If a role keeps slipping through that shouldn't, add it to excluded_titles
  # below instead.

locations:
  - "[City 1], [Country]"
  - "[City 2], [Country]"
  - Remote
  # Add more acceptable locations here

remote_ok: true

seniority:
  min: mid       # junior, mid, senior, staff, principal
  max: senior

salary:
  min_inr: 0     # Minimum acceptable salary in INR (set 0 to disable)
  currency: INR  # Change to USD, EUR, etc. as needed

visa_sponsorship_needed: false

# Jobs scoring below this threshold are marked should_not_apply
fit_score_threshold: 70

# Hard non-negotiables — any job failing these is rejected without LLM call
non_negotiables: []

# Roles/industries to skip entirely
excluded_industries: []
excluded_titles:
  - "QA Engineer"
  - "Test Engineer"
  # Add more titles to exclude

# Keyword filter — applied to the job description (not the title) before LLM scoring.
# A job passes if its description contains AT LEAST ONE of these keywords (case-insensitive).
# Jobs with no description (e.g. Workday) bypass this filter and go straight to the LLM.
# Leave empty ([]) to disable the filter entirely and send all title-matched jobs to the LLM.
tech_keywords:
  - python
  - django
  - flask
  - fastapi
  - rest api
  - restful
  - aws
  - gcp
  - azure
  - postgresql
  - postgres
  - sql
  - redis
  - kafka
  - docker
  - kubernetes
  - microservices
  - backend
  - api
  # Add or remove keywords to tune how aggressively you pre-filter

# Title tokens that flag a role as too senior — job is rejected without LLM call.
# Each token is matched as a whole word (case-insensitive) anywhere in the title.
over_seniority_tokens:
  - staff engineer
  - staff software
  - principal engineer
  - principal software
  - distinguished engineer
  - fellow
  - director of
  - vp
  - "vp,"
  - vice president
  - head of engineering
  - engineering manager
  - "em,"
  - cto

# Title tokens that flag a role as too junior — rejected when seniority.min is above junior.
under_seniority_tokens:
  - junior
  - jr
  - entry level
  - entry-level
  - intern
  - internship
  - graduate engineer
  - associate engineer

# City/region substrings used to match the "India" preference entry against job locations
# that omit the country name (e.g. "Hyderabad, Telangana" still passes for pref "India").
india_cities:
  - india
  - hyderabad
  - bangalore
  - bengaluru
  - delhi
  - ncr
  - gurugram
  - gurgaon
  - noida
  - mumbai
  - pune
  - chennai
